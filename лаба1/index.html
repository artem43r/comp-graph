    <h1>Лабораторная работа №1</h1>

    <canvas id="myCanvas" width="800" height="600"></canvas>

    <div id="controls" class="controls">
        <div>
            <button onclick="startStopwatch()">▶️ Старт</button>

            <button onclick="resetTimer()">🔄 Сброс</button>
            <button onclick="lapTimer()">⏱️ Лапа</button>
        </div>

        <div>
            <label>Таймер:</label>
            <input type="number" id="timerInput" min="1" max="3600" value="60">
            сек

        </div>

        <div id="lapsList"></div>
    </div>
